<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OBS Overlay - Bovinos</title>
    <style>
        /* Fundo transparente essencial para o OBS */
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        .wrapper {
            position: absolute;
            bottom: 30px;
            left: 5%;
            width: 90%;
            display: none; /* Inicia oculto, aparece se for bovino ativo */
        }

        .gc-container {
            background: rgba(11, 27, 61, 0.96);
            border-left: 8px solid #f59e0b;
            border-radius: 6px;
            color: white;
            display: grid;
            grid-template-columns: 3fr 1fr;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            padding: 15px;
        }

        .info-side .lote-title {
            font-size: 26px;
            font-weight: bold;
            color: #f59e0b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-side .detalhes {
            font-size: 18px;
            margin-top: 5px;
            color: #e5e7eb;
        }

        .info-side .vendedor {
            font-size: 14px;
            color: #9ca3af;
            margin-top: 4px;
            font-style: italic;
        }

        /* Design estruturado para exibir linhagem de touros reprodutores */
        .genealogia-obs {
            margin-top: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            color: #cbd5e1;
            display: none; /* Só exibe se houver dados informados */
        }

        .finance-side {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            padding: 5px;
        }

        .finance-side .condicao { font-size: 12px; color: #cbd5e1; font-weight: bold; }
        .finance-side .lance { font-size: 32px; font-weight: bold; color: #4ade80; }
        
        .live-indicator {
            background: #ef4444;
            color: white;
            padding: 2px 6px;
            font-size: 12px;
            font-weight: bold;
            position: absolute;
            top: -22px;
            left: 0;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="wrapper" id="gcBovino">
    <div class="live-indicator">AO VIVO</div>
    <div class="gc-container">
        <div class="info-side">
            <div class="lote-title" id="loteTxt">LOTE: --</div>
            <div class="detalhes" id="detalhesTxt">Carregando dados...</div>
            <div class="vendedor" id="vendedorTxt">Origem: --</div>
            <div class="genealogia-obs" id="genealogiaBox"></div>
        </div>
        <div class="finance-side">
            <div class="condicao" id="condicaoTxt">-- PARCELAS</div>
            <div class="lance" id="lanceTxt">R$ 0,00</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Credenciais de produção integradas com sucesso do seu banco de dados
    const firebaseConfig = {
        apiKey: "AIzaSyAMxBFnJwstpdUuT_Bl6EVYl6hR6h6TF80",
        authDomain: "bd-leilao-moabb.firebaseapp.com",
        databaseURL: "https://bd-leilao-moabb-default-rtdb.firebaseio.com",
        projectId: "bd-leilao-moabb",
        storageBucket: "bd-leilao-moabb.firebasestorage.app",
        messagingSenderId: "1067323234874",
        appId: "1:1067323234874:web:44c5bef512043972fdf303"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'loteAtivo'), (snapshot) => {
        const wrapper = document.getElementById('gcBovino');
        
        // Se o nó estiver vazio ou for desativado (null) no painel, limpa e esconde
        if (!snapshot.exists() || snapshot.val() === null) {
            wrapper.style.display = 'none';
            return;
        }

        const lote = snapshot.val();
        
        // Só renderiza e exibe se o tipo do lote ativo for bovino
        if (lote.tipo === 'bovino') {
            wrapper.style.display = 'block';
            
            // Montagem do título principal
            let sufixoNome = lote.nomeBovino ? ` - ${lote.nomeBovino.toUpperCase()}` : '';
            document.getElementById('loteTxt').innerText = `${lote.numero}${sufixoNome} (${lote.qtd} ${lote.qtd > 1 ? 'CABEÇAS' : 'CABEÇA'})`;
            document.getElementById('vendedorTxt').innerText = `Origem: ${lote.vendedor}`;
            document.getElementById('condicaoTxt').innerText = lote.condicao.toUpperCase();
            
            // Renderização do lance opcional
            if (lote.lance && lote.lance !== '') {
                document.getElementById('lanceTxt').innerText = `R$ ${parseFloat(lote.lance).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            } else {
                document.getElementById('lanceTxt').innerText = 'A DEFINIR';
            }
            
            // Renderização das especificações técnicas comerciais
            let extraCe = lote.ceBovino ? ` | C.E: <strong>${lote.ceBovino}</strong>` : '';
            let extraRgd = lote.rgdBovino ? ` | RGD: <strong>${lote.rgdBovino}</strong>` : '';
            document.getElementById('detalhesTxt').innerHTML = `RAÇA: <strong>${lote.raca}</strong> | IDADE: <strong>${lote.categoria}</strong> | PESO: <strong>${lote.peso ? lote.peso+' kg' : 'N/I'}</strong>${extraCe}${extraRgd}`;
            
            // Renderização Inteligente da Linhagem de Elite (Touros / PO)
            const genBox = document.getElementById('genealogiaBox');
            if (lote.paiBovino || lote.maeBovino) {
                genBox.style.display = 'block';
                
                let paiEavos = lote.paiBovino || 'N/I';
                if(lote.avoPatBovino) paiEavos += ` (p. ${lote.avoPatBovino})`;
                
                let maeEavos = lote.maeBovino || 'N/I';
                if(lote.avoMatBovino) maeEavos += ` (p. ${lote.avoMatBovino})`;

                genBox.innerHTML = `LINHAGEM - PAI: <strong>${paiEavos}</strong> | MÃE: <strong>${maeEavos}</strong>`;
            } else {
                genBox.style.display = 'none';
            }
        } else {
            wrapper.style.display = 'none'; // Esconde se for do tipo equino
        }
    });
</script>
</body>
</html>
