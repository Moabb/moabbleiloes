<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OBS Overlay - Bovinos</title>
    <style>
        /* Fundo transparente essencial para o OBS */
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        .wrapper {
            position: absolute;
            bottom: 30px;
            left: 10%;
            width: 80%;
            display: none; /* Inicia oculto, aparece se for bovino ativo */
        }

        .gc-container {
            background: transparent;
            border-left: 8px solid transparent;
            border-radius: 6px;
            color: white;
            display: grid;
            grid-template-columns: 3fr 1fr;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            padding: 15px;
        }

        .info-side .lote-title {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-side .detalhes {
            font-size: 16px;
            margin-top: 3px;
            color: #ffffff;
        }

        .info-side .vendedor {
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            margin-top: 4px;
        }

        /* Design estruturado para exibir linhagem de touros reprodutores */
        .genealogia-obs {
            margin-right: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px;
            border-radius: 4px;
            font-size: 13px;
            color: #ffffff;
            display: none; /* Só exibe se houver dados informados */
        }

        .finance-side {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            padding: 5px;
        }

        .finance-side .condicao { font-size: 12px; color: #cbd5e1; font-weight: bold; }
        .finance-side .lance { font-size: 32px; font-weight: bold; color: #4ade80; }
        
        .live-indicator {
            background: #ef4444;
            color: white;
            padding: 2px 6px;
            font-size: 12px;
            font-weight: bold;
            position: absolute;
            top: -22px;
            left: 23PX;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="wrapper" id="gcBovino">
    <div class="live-indicator">AO VIVO</div>
    <div class="gc-container">
        <div class="info-side">
            <div class="lote-title" id="loteTxt">LOTE: --</div>
            <div class="detalhes" id="detalhesTxt">Carregando dados...</div>
            <div class="vendedor" id="vendedorTxt">Origem: --</div>
            <div class="genealogia-obs" id="genealogiaBox"></div>
        </div>
        <div class="finance-side">
            <div class="condicao" id="condicaoTxt">-- PARCELAS</div>
            <div class="lance" id="lanceTxt">R$ 0,00</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxBFnJwstpdUuT_Bl6EVYl6hR6h6TF80",
        authDomain: "bd-leilao-moabb.firebaseapp.com",
        databaseURL: "https://bd-leilao-moabb-default-rtdb.firebaseio.com",
        projectId: "bd-leilao-moabb",
        storageBucket: "bd-leilao-moabb.firebasestorage.app",
        messagingSenderId: "1067323234874",
        appId: "1:1067323234874:web:44c5bef512043972fdf303"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'loteAtivo'), (snapshot) => {
        const wrapper = document.getElementById('gcBovino');
        
        if (!snapshot.exists() || snapshot.val() === null) {
            wrapper.style.display = 'none';
            return;
        }

        const lote = snapshot.val();
        
        if (lote.tipo === 'bovino') {
            wrapper.style.display = 'block';
            
            let sufixoNome = lote.nomeBovino ? ` - ${lote.nomeBovino.toUpperCase()}` : '';
            document.getElementById('loteTxt').innerText = `LOTE ${lote.numero}${sufixoNome} (${lote.qtd} ${lote.qtd > 1 ? 'CABEÇAS' : 'CABEÇA'})`;
            document.getElementById('vendedorTxt').innerText = `Origem: ${lote.vendedor}`;
            document.getElementById('condicaoTxt').innerText = lote.condicao.toUpperCase();
            
            if (lote.lance && lote.lance !== '') {
                document.getElementById('lanceTxt').innerText = `R$ ${parseFloat(lote.lance).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            } else {
                document.getElementById('lanceTxt').innerText = '';
            }
            
            // --- NOVA LÓGICA DE EXIBIÇÃO DINÂMICA DE DETALHES ---
            let partesDetalhes = [];

            if (lote.raca && lote.raca.trim() !== '') {
                partesDetalhes.push(`RAÇA: <strong>${lote.raca.toUpperCase()}</strong>`);
            }
            
            if (lote.categoria && lote.categoria.trim() !== '') {
                partesDetalhes.push(`IDADE: <strong>${lote.categoria.toUpperCase()}</strong>`);
            }
            
            // Só adiciona o peso se ele existir, não estiver vazio e for diferente de N/I
            if (lote.peso && lote.peso.trim() !== '' && lote.peso.toUpperCase() !== 'N/I') {
                partesDetalhes.push(`PESO: <strong>${lote.peso} KG</strong>`);
            }
            
            if (lote.ceBovino && lote.ceBovino.trim() !== '') {
                partesDetalhes.push(`C.E: <strong>${lote.ceBovino.toUpperCase()}</strong>`);
            }
            
            if (lote.rgdBovino && lote.rgdBovino.trim() !== '') {
                partesDetalhes.push(`RGD: <strong>${lote.rgdBovino.toUpperCase()}</strong>`);
            }

            // Junta todos os campos válidos usando a barra " | " como separador automático
            document.getElementById('detalhesTxt').innerHTML = partesDetalhes.join(' | ');
            
            // Renderização da Linhagem de Elite (Touros / PO)
            const genBox = document.getElementById('genealogiaBox');
            if (lote.paiBovino || lote.maeBovino) {
                genBox.style.display = 'block';
                
                let paiEavos = lote.paiBovino || 'N/I';
                if(lote.avoPatBovino) paiEavos += ` (AVÔ. ${lote.avoPatBovino})`;
                
                let maeEavos = lote.maeBovino || 'N/I';
                if(lote.avoMatBovino) maeEavos += ` (AVÓ. ${lote.avoMatBovino})`;

                genBox.innerHTML = `LINHAGEM - PAI: <strong>${paiEavos}</strong> | MÃE: <strong>${maeEavos}</strong>`;
            } else {
                genBox.style.display = 'none';
            }
        } else {
            wrapper.style.display = 'none';
        }
    });
</script>
</body>
</html>
