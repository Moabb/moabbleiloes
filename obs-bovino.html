<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OBS Overlay - Bovinos</title>
    <style>
        /* Fundo transparente essencial para o OBS */
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        .wrapper {
            position: absolute;
            bottom: 30px;
            left: 5%;
            width: 90%;
            display: none; /* Inicia oculto, aparece se for bovino */
        }

        .gc-container {
            background: rgba(11, 27, 61, 0.95);
            border-left: 8px solid #f59e0b;
            border-radius: 6px;
            color: white;
            display: grid;
            grid-template-columns: 3fr 1fr;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            padding: 15px;
        }

        .info-side .lote-title {
            font-size: 26px;
            font-weight: bold;
            color: #f59e0b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-side .detalhes {
            font-size: 18px;
            margin-top: 5px;
            color: #e5e7eb;
        }

        .info-side .vendedor {
            font-size: 14px;
            color: #9ca3af;
            margin-top: 4px;
            font-style: italic;
        }

        .finance-side {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            padding: 5px;
        }

        .finance-side .condicao { font-size: 12px; color: #cbd5e1; font-weight: bold; }
        .finance-side .lance { font-size: 32px; font-weight: bold; color: #4ade80; }
        
        .live-indicator {
            background: #ef4444;
            color: white;
            padding: 2px 6px;
            font-size: 12px;
            font-weight: bold;
            position: absolute;
            top: -22px;
            left: 0;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="wrapper" id="gcBovino">
    <div class="live-indicator">AO VIVO</div>
    <div class="gc-container">
        <div class="info-side">
            <div class="lote-title" id="loteTxt">LOTE: --</div>
            <div class="detalhes" id="detalhesTxt">Carregando dados...</div>
            <div class="vendedor" id="vendedorTxt">Origem: --</div>
        </div>
        <div class="finance-side">
            <div class="condicao" id="condicaoTxt">-- PARCELAS</div>
            <div class="lance" id="lanceTxt">R$ 0,00</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // INSIRA CONFIGURAÇÃO DO SEU FIREBASE AQUI:
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_DOMINIO.firebaseapp.com",
        databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'loteAtivo'), (snapshot) => {
        const wrapper = document.getElementById('gcBovino');
        if (snapshot.exists()) {
            const lote = snapshot.val();
            
            // Só mostra a arte se for da categoria bovino
            if(lote.tipo === 'bovino') {
                wrapper.style.display = 'block';
                document.getElementById('loteTxt').innerText = `${lote.numero} (${lote.qtd} ${lote.qtd > 1 ? 'CABEÇAS' : 'CABEÇA'})`;
                document.getElementById('vendedorTxt').innerText = `Origem: ${lote.vendedor}`;
                document.getElementById('condicaoTxt').innerText = lote.condicao.toUpperCase();
                document.getElementById('lanceTxt').innerText = `R$ ${parseFloat(lote.lance).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                document.getElementById('detalhesTxt').innerHTML = `RAÇA: <strong>${lote.raca}</strong> | CATEGORIA: <strong>${lote.categoria}</strong> | PESO MÉDIO: <strong>${lote.peso || 'N/I'}</strong>`;
            } else {
                wrapper.style.display = 'none'; // Esconde se for equino
            }
        } else {
            wrapper.style.display = 'none';
        }
    });
</script>
</body>
</html>
