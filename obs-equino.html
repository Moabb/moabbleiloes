<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OBS Overlay - Equinos</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; font-family: 'Georgia', serif; }
        
        .wrapper {
            position: absolute;
            bottom: 30px;
            left: 5%;
            width: 90%;
            display: none;
        }

        .gc-container {
            background: rgba(44, 24, 9, 0.96); /* Marrom Escuro Elite */
            border-left: 8px solid #d97706; /* Dourado/Bronze */
            border-radius: 4px;
            color: white;
            display: grid;
            grid-template-columns: 3fr 1fr;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            padding: 15px;
        }

        .info-side .lote-title {
            font-size: 24px;
            font-weight: bold;
            color: #fbbf24;
        }

        .info-side .nome-cavalo {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            margin: 2px 0;
            font-family: sans-serif;
        }

        .info-side .detalhes {
            font-size: 16px;
            color: #ddc;
        }

        .finance-side {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .finance-side .condicao { font-size: 11px; color: #fcd34d; letter-spacing: 1px; }
        .finance-side .lance { font-size: 30px; font-weight: bold; color: #34d399; font-family: sans-serif; }
    </style>
</head>
<body>

<div class="wrapper" id="gcEquino">
    <div class="gc-container">
        <div class="info-side">
            <div class="lote-title" id="loteTxt">LOTE: --</div>
            <div class="nome-cavalo" id="nomeTxt">NOME DO ANIMAL</div>
            <div class="detalhes" id="detalhesTxt">Carregando dados...</div>
        </div>
        <div class="finance-side">
            <div class="condicao" id="condicaoTxt">-- PARCELAS</div>
            <div class="lance" id="lanceTxt">R$ 0,00</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // INSIRA CONFIGURAÇÃO DO SEU FIREBASE AQUI:
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_DOMINIO.firebaseapp.com",
        databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'loteAtivo'), (snapshot) => {
        const wrapper = document.getElementById('gcEquino');
        if (snapshot.exists()) {
            const lote = snapshot.val();
            
            if(lote.tipo === 'equino') {
                wrapper.style.display = 'block';
                document.getElementById('loteTxt').innerText = `${lote.numero} - HARAS/ORIGEM: ${lote.vendedor.toUpperCase()}`;
                document.getElementById('nomeTxt').innerText = lote.nome.toUpperCase();
                document.getElementById('condicaoTxt').innerText = lote.condicao.toUpperCase();
                document.getElementById('lanceTxt').innerText = `R$ ${parseFloat(lote.lance).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                document.getElementById('detalhesTxt').innerHTML = `RAÇA: <strong>${lote.raca}</strong> | PELAGEM: <strong>${lote.pelagem || 'N/I'}</strong>`;
            } else {
                wrapper.style.display = 'none';
            }
        } else {
            wrapper.style.display = 'none';
        }
    });
</script>
</body>
</html>
