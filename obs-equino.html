<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OBS Overlay - Equinos</title>
    <style>
        /* Fundo transparente essencial para o OBS */
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; font-family: 'Georgia', serif; }
        
        .wrapper {
            position: absolute;
            bottom: 30px;
            left: 5%;
            width: 90%;
            display: none; /* Inicia oculto, aparece se for equino ativo */
        }

        .gc-container {
            background: rgba(44, 24, 9, 0.96); /* Marrom Escuro Elite */
            border-left: 8px solid #d97706; /* Dourado/Bronze */
            border-radius: 4px;
            color: white;
            display: grid;
            grid-template-columns: 3fr 1fr;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            padding: 15px;
        }

        .info-side .lote-title {
            font-size: 22px;
            font-weight: bold;
            color: #fbbf24;
            text-transform: uppercase;
        }

        .info-side .nome-cavalo {
            font-size: 30px;
            font-weight: bold;
            color: #fff;
            margin: 2px 0;
            font-family: sans-serif;
            letter-spacing: 0.5px;
        }

        .info-side .detalhes {
            font-size: 17px;
            color: #ddc;
        }

        /* Estilo para exibir pedigree (Pai e Mãe) de cavalos de elite */
        .genealogia-obs {
            margin-top: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 4px;
            font-size: 13px;
            color: #fcd34d;
            font-family: sans-serif;
            display: none;
        }

        .finance-side {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            padding: 5px;
        }

        .finance-side .condicao { font-size: 11px; color: #fcd34d; letter-spacing: 1px; font-weight: bold; }
        .finance-side .lance { font-size: 30px; font-weight: bold; color: #34d399; font-family: sans-serif; }
    </style>
</head>
<body>

<div class="wrapper" id="gcEquino">
    <div class="gc-container">
        <div class="info-side">
            <div class="lote-title" id="loteTxt">LOTE: --</div>
            <div class="nome-cavalo" id="nomeTxt">NOME DO ANIMAL</div>
            <div class="detalhes" id="detalhesTxt">Carregando dados...</div>
            <div class="genealogia-obs" id="genealogiaBox"></div>
        </div>
        <div class="finance-side">
            <div class="condicao" id="condicaoTxt">-- PARCELAS</div>
            <div class="lance" id="lanceTxt">R$ 0,00</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Credenciais de produção integradas do seu projeto oficial
    const firebaseConfig = {
        apiKey: "AIzaSyAMxBFnJwstpdUuT_Bl6EVYl6hR6h6TF80",
        authDomain: "bd-leilao-moabb.firebaseapp.com",
        databaseURL: "https://bd-leilao-moabb-default-rtdb.firebaseio.com",
        projectId: "bd-leilao-moabb",
        storageBucket: "bd-leilao-moabb.firebasestorage.app",
        messagingSenderId: "1067323234874",
        appId: "1:1067323234874:web:44c5bef512043972fdf303"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'loteAtivo'), (snapshot) => {
        const wrapper = document.getElementById('gcEquino');
        
        // Trata desativação do painel (caso clique no botão vermelho "NO AR" para limpar a tela)
        if (!snapshot.exists() || snapshot.val() === null) {
            wrapper.style.display = 'none';
            return;
        }

        const lote = snapshot.val();
        
        // Só exibe a arte se a categoria do lote ativo for equino
        if (lote.tipo === 'equino') {
            wrapper.style.display = 'block';
            
            document.getElementById('loteTxt').innerText = `${lote.numero} - HARAS/ORIGEM: ${lote.vendedor.toUpperCase()}`;
            document.getElementById('nomeTxt').innerText = lote.nome ? lote.nome.toUpperCase() : 'ANIMAL SEM REGISTRO';
            document.getElementById('condicaoTxt').innerText = lote.condicao.toUpperCase();
            
            // Renderização do lance opcional
            if (lote.lance && lote.lance !== '') {
                document.getElementById('lanceTxt').innerText = `R$ ${parseFloat(lote.lance).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            } else {
                document.getElementById('lanceTxt').innerText = 'A DEFINIR';
            }
            
            // Detalhes da raça, pelagem e passaporte se houver
            let rgdTexto = lote.rgdEquino ? ` | RE/PAS: <strong>${lote.rgdEquino}</strong>` : '';
            document.getElementById('detalhesTxt').innerHTML = `RAÇA: <strong>${lote.raca}</strong> | PELAGEM: <strong>${lote.pelagem || 'N/I'}</strong> | QTD: <strong>${lote.qtd} Un.</strong>${rgdTexto}`;
            
            // Renderização inteligente do pedigree de cavalos
            const genBox = document.getElementById('genealogiaBox');
            if (lote.pai || lote.mae) {
                genBox.style.display = 'block';
                genBox.innerHTML = `PAI: <strong>${lote.pai || 'N/I'}</strong> | MÃE: <strong>${lote.mae || 'N/I'}</strong>`;
            } else {
                genBox.style.display = 'none';
            }
        } else {
            wrapper.style.display = 'none'; // Se for bovino ativo, esconde o layout de cavalos
        }
    });
</script>
</body>
</html>
